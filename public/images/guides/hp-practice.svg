<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Practice session breakdown -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">The 20-Minute Practice Session</text>
  <!-- Bar chart -->
  <rect x="120" y="70" width="130" height="160" rx="8" fill="#0284C7" opacity="0.15"/>
  <rect x="120" y="190" width="130" height="40" rx="0" fill="#0284C7" opacity="0.25"/>
  <text x="185" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0284C7" text-anchor="middle">5</text>
  <text x="185" y="150" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">min</text>
  <text x="185" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0284C7" text-anchor="middle">Warm Up</text>
  <text x="185" y="255" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Play each note</text>
  <text x="185" y="270" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">slowly around</text>

  <rect x="270" y="70" width="130" height="160" rx="8" fill="#0284C7" opacity="0.25"/>
  <rect x="270" y="190" width="130" height="40" rx="0" fill="#0284C7" opacity="0.35"/>
  <text x="335" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0284C7" text-anchor="middle">5</text>
  <text x="335" y="150" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">min</text>
  <text x="335" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0284C7" text-anchor="middle">Technique</text>
  <text x="335" y="255" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Clean strikes,</text>
  <text x="335" y="270" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">weak hand work</text>

  <rect x="420" y="70" width="130" height="160" rx="8" fill="#0284C7" opacity="0.35"/>
  <rect x="420" y="190" width="130" height="40" rx="0" fill="#0284C7" opacity="0.45"/>
  <text x="485" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0284C7" text-anchor="middle">5</text>
  <text x="485" y="150" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">min</text>
  <text x="485" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0284C7" text-anchor="middle">Exercises</text>
  <text x="485" y="255" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Specific pattern</text>
  <text x="485" y="270" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">or rhythm</text>

  <rect x="570" y="70" width="130" height="160" rx="8" fill="#0284C7" opacity="0.5"/>
  <rect x="570" y="190" width="130" height="40" rx="0" fill="#0284C7" opacity="0.6"/>
  <text x="635" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <text x="635" y="150" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">min</text>
  <text x="635" y="215" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0284C7" text-anchor="middle">Free Play</text>
  <text x="635" y="255" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Improvise</text>
  <text x="635" y="270" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">and enjoy</text>

  <text x="400" y="308" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">20 minutes daily beats 2 hours on weekends</text>
</svg>
