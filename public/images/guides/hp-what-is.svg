<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Timeline -->
  <line x1="100" y1="160" x2="700" y2="160" stroke="#0284C7" stroke-width="2" opacity="0.2"/>
  <!-- 2000 - Hang invented -->
  <circle cx="150" cy="160" r="8" fill="#0284C7"/>
  <text x="150" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">2000</text>
  <text x="150" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Hang invented</text>
  <text x="150" y="210" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">by PANArt</text>
  <!-- 2007 - Handpan term -->
  <circle cx="300" cy="160" r="8" fill="#0284C7" opacity="0.7"/>
  <text x="300" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">2007</text>
  <text x="300" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">"Handpan" term</text>
  <text x="300" y="210" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">coined</text>
  <!-- 2013 - PANArt stops -->
  <circle cx="450" cy="160" r="8" fill="#0284C7" opacity="0.7"/>
  <text x="450" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">2013</text>
  <text x="450" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">PANArt stops</text>
  <text x="450" y="210" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">public sales</text>
  <!-- Today -->
  <circle cx="600" cy="160" r="8" fill="#0284C7"/>
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">Today</text>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">100+ makers</text>
  <text x="600" y="210" font-family="Arial, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">worldwide</text>
  <!-- Label -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">From a Swiss workshop to a global instrument</text>
</svg>
