<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- 5 tool cards -->
  <rect x="40" y="50" width="130" height="140" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="40" y="50" width="130" height="4" rx="2" fill="#0284C7"/>
  <text x="105" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Cursor</text>
  <text x="105" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">AI-native IDE</text>
  <text x="105" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">For developers</text>
  <rect x="65" y="155" width="80" height="22" rx="6" fill="#F0F9FF"/>
  <text x="105" y="170" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">⭐ Control</text>

  <rect x="190" y="50" width="130" height="140" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="190" y="50" width="130" height="4" rx="2" fill="#0284C7"/>
  <text x="255" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Claude Code</text>
  <text x="255" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">CLI agent</text>
  <text x="255" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">For power users</text>
  <rect x="215" y="155" width="80" height="22" rx="6" fill="#F0F9FF"/>
  <text x="255" y="170" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">⭐ Power</text>

  <rect x="340" y="50" width="130" height="140" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="340" y="50" width="130" height="4" rx="2" fill="#0284C7"/>
  <text x="405" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Bolt</text>
  <text x="405" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Browser-based</text>
  <text x="405" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">For prototyping</text>
  <rect x="365" y="155" width="80" height="22" rx="6" fill="#F0F9FF"/>
  <text x="405" y="170" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">⭐ Speed</text>

  <rect x="490" y="50" width="130" height="140" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="490" y="50" width="130" height="4" rx="2" fill="#0284C7"/>
  <text x="555" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Lovable</text>
  <text x="555" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Visual builder</text>
  <text x="555" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">For non-devs</text>
  <rect x="515" y="155" width="80" height="22" rx="6" fill="#F0F9FF"/>
  <text x="555" y="170" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">⭐ Design</text>

  <rect x="640" y="50" width="130" height="140" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="640" y="50" width="130" height="4" rx="2" fill="#0284C7"/>
  <text x="705" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Replit</text>
  <text x="705" y="115" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">All-in-one IDE</text>
  <text x="705" y="135" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">For learning</text>
  <rect x="665" y="155" width="80" height="22" rx="6" fill="#F0F9FF"/>
  <text x="705" y="170" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">⭐ Learning</text>

  <!-- Bottom label -->
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">Common workflow: Prototype with Lovable/Bolt → Refine with Cursor/Claude Code → Ship</text>
  <!-- Flow arrows -->
  <path d="M250 260 L350 260" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.3"/>
  <path d="M450 260 L550 260" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.3"/>
  <rect x="155" y="250" width="90" height="24" rx="6" fill="#0284C7" opacity="0.08"/>
  <text x="200" y="266" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">Prototype</text>
  <rect x="355" y="250" width="90" height="24" rx="6" fill="#0284C7" opacity="0.08"/>
  <text x="400" y="266" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">Refine</text>
  <rect x="555" y="250" width="90" height="24" rx="6" fill="#0284C7" opacity="0.12"/>
  <text x="600" y="266" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" font-weight="bold" text-anchor="middle">Ship</text>
</svg>
