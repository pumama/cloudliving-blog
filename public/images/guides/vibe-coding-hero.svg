  <path d="M480 160 L476 160" stroke="#0284C7" stroke-width="2" stroke-linecap="round"/>
  <path d="M544 160 L540 160" stroke="#0284C7" stroke-width="2" stroke-linecap="round"/>
  <path d="M489 139 L486 136" stroke="#0284C7" stroke-width="2" stroke-linecap="round"/>
