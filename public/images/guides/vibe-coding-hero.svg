  <circle cx="510" cy="160" r="44" fill="white" stroke="#0284C7" stroke-width="2"/>
  <circle cx="510" cy="160" r="30" fill="#F0F9FF"/>
  <!-- Sparkle paths -->
  <path d="M510 130 L510 126" stroke="#0284C7" stroke-width="2" stroke-linecap="round"/>
