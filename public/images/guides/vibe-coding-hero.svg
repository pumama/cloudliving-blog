  <rect x="630" y="60" width="140" height="28" rx="12" fill="#0284C7"/>
  <rect x="630" y="86" width="140" height="2" fill="#0284C7" opacity="0.2"/>
  <text x="700" y="79" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">My App</text>

  <!-- App content mockup -->
  <rect x="645" y="100" width="110" height="10" rx="5" fill="#0284C7" opacity="0.15"/>
