  <rect x="645" y="192" width="110" height="28" rx="6" fill="#F0F9FF" stroke="#E0E7EE" stroke-width="1"/>
  <rect x="655" y="200" width="60" height="5" rx="2.5" fill="#0284C7" opacity="0.4"/>
  <rect x="655" y="210" width="80" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>

