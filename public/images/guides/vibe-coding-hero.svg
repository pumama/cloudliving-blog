  <text x="700" y="244" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Submit</text>

  <!-- Labels -->
  <text x="220" y="306" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Your idea</text>
  <text x="510" y="226" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">AI builds it</text>
  <text x="700" y="286" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Working app</text>
