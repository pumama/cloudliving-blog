<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Three cards -->
  <rect x="60" y="50" width="200" height="220" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="60" y="50" width="200" height="4" rx="2" fill="#22C55E"/>
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B" text-anchor="middle">Scale</text>
  <text x="160" y="120" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">D Minor (Kurd)</text>
  <text x="160" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Celtic Minor</text>
  <text x="160" y="160" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">D Major</text>
  <text x="160" y="180" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Pygmy</text>
  <rect x="100" y="200" width="120" height="28" rx="6" fill="#F0FDF4"/>
  <text x="160" y="218" font-family="Arial, sans-serif" font-size="10" fill="#22C55E" text-anchor="middle">Start with D Minor</text>

  <rect x="300" y="50" width="200" height="220" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="300" y="50" width="200" height="4" rx="2" fill="#0284C7"/>
  <text x="400" y="90" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B" text-anchor="middle">Material</text>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Nitrided Steel</text>
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Stainless Steel</text>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Ember Steel</text>
  <rect x="340" y="200" width="120" height="28" rx="6" fill="#F0F9FF"/>
  <text x="400" y="218" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">Nitrided = safe bet</text>

  <rect x="540" y="50" width="200" height="220" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="540" y="50" width="200" height="4" rx="2" fill="#F59E0B"/>
  <text x="640" y="90" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E293B" text-anchor="middle">Budget</text>
  <text x="640" y="120" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" text-anchor="middle">Under $500 — avoid</text>
  <text x="640" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">$800-1,200 — entry</text>
  <text x="640" y="160" font-family="Arial, sans-serif" font-size="11" fill="#22C55E" text-anchor="middle">$1,500-2,500 — sweet spot</text>
  <text x="640" y="180" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">$2,500+ — premium</text>
  <rect x="580" y="200" width="120" height="28" rx="6" fill="#FFFBEB"/>
  <text x="640" y="218" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" text-anchor="middle">Budget $1,000-1,500</text>

  <text x="400" y="305" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">The three decisions that matter</text>
</svg>
