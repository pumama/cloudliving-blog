<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Skill tree -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Your Handpan Journey</text>
  <!-- Beginner -->
  <rect x="60" y="70" width="200" height="200" rx="12" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="60" y="70" width="200" height="4" rx="2" fill="#22C55E"/>
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#22C55E" text-anchor="middle">BEGINNER</text>
  <text x="160" y="125" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Clean tone strikes</text>
  <text x="160" y="145" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Basic rhythm (ding + tak)</text>
  <text x="160" y="165" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Simple melodies</text>
  <text x="160" y="185" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Note layout memorized</text>
  <rect x="100" y="210" width="120" height="28" rx="6" fill="#F0FDF4"/>
  <text x="160" y="228" font-family="Arial, sans-serif" font-size="10" fill="#22C55E" text-anchor="middle">Week 1-4</text>
  <!-- Arrow -->
  <path d="M265 170 L295 170" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.3"/>
  <path d="M290 164 L300 170 L290 176" fill="#0284C7" opacity="0.3"/>
  <!-- Intermediate -->
  <rect x="300" y="70" width="200" height="200" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="300" y="70" width="200" height="4" rx="2" fill="#0284C7"/>
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">INTERMEDIATE</text>
  <text x="400" y="125" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Harmonics</text>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Ghost notes</text>
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Dynamic control</text>
  <text x="400" y="185" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Cross-hand patterns</text>
  <rect x="340" y="210" width="120" height="28" rx="6" fill="#F0F9FF"/>
  <text x="400" y="228" font-family="Arial, sans-serif" font-size="10" fill="#0284C7" text-anchor="middle">Month 2-6</text>
  <!-- Arrow -->
  <path d="M505 170 L535 170" stroke="#0284C7" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.3"/>
  <path d="M530 164 L540 170 L530 176" fill="#0284C7" opacity="0.3"/>
  <!-- Advanced -->
  <rect x="540" y="70" width="200" height="200" rx="12" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="540" y="70" width="200" height="4" rx="2" fill="#94A3B8"/>
  <text x="640" y="100" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#94A3B8" text-anchor="middle">ADVANCED</text>
  <text x="640" y="125" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Polyrhythms</text>
  <text x="640" y="145" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Composition</text>
  <text x="640" y="165" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Jam with others</text>
  <text x="640" y="185" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Performance</text>
  <rect x="580" y="210" width="120" height="28" rx="6" fill="#F8FAFC"/>
  <text x="640" y="228" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Month 6+</text>

  <text x="400" y="305" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Every stage is enjoyable. There's no rush.</text>
</svg>
