<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <rect width="800" height="260" rx="12" fill="#F8FAFC"/>

  <!-- Bad prompt -->
  <rect x="30" y="20" width="355" height="220" rx="10" fill="white" stroke="#EF4444" stroke-width="1.5" opacity="0.6"/>
  <rect x="30" y="20" width="355" height="36" rx="10" fill="#FEF2F2"/>
  <circle cx="52" cy="38" r="8" fill="#EF4444" opacity="0.2"/>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" text-anchor="middle">✗</text>
  <text x="207" y="43" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#DC2626" text-anchor="middle">Bad Prompt</text>

  <text x="50" y="82" font-family="Arial, sans-serif" font-size="12" fill="#64748B">"Add authentication"</text>

  <text x="50" y="116" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Problems:</text>
  <text x="50" y="138" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">• No context — which auth method?</text>
  <text x="50" y="158" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">• No details — what pages? what flow?</text>
  <text x="50" y="178" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">• No constraints — which library?</text>
  <text x="50" y="198" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">• No scope — too vague to execute</text>

  <!-- Good prompt -->
  <rect x="415" y="20" width="355" height="220" rx="10" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <rect x="415" y="20" width="355" height="36" rx="10" fill="#F0F9FF"/>
  <circle cx="437" cy="38" r="8" fill="#0284C7" opacity="0.2"/>
  <text x="437" y="42" font-family="Arial, sans-serif" font-size="12" fill="#0284C7" text-anchor="middle">✓</text>
  <text x="592" y="43" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0284C7" text-anchor="middle">Good Prompt</text>

  <text x="435" y="76" font-family="Arial, sans-serif" font-size="11" fill="#64748B">"Add email/password auth using</text>
  <text x="435" y="92" font-family="Arial, sans-serif" font-size="11" fill="#64748B">Supabase Auth. Create /login and</text>
  <text x="435" y="108" font-family="Arial, sans-serif" font-size="11" fill="#64748B">/signup pages. After login, redirect</text>
  <text x="435" y="124" font-family="Arial, sans-serif" font-size="11" fill="#64748B">to /dashboard. Show user email in</text>
  <text x="435" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748B">sidebar. Protect all routes except</text>
  <text x="435" y="156" font-family="Arial, sans-serif" font-size="11" fill="#64748B">/login and /signup."</text>

  <text x="435" y="186" font-family="Arial, sans-serif" font-size="11" fill="#0284C7">✓ Specific  ✓ Contextual</text>
  <text x="435" y="206" font-family="Arial, sans-serif" font-size="11" fill="#0284C7">✓ Constrained  ✓ Scoped</text>
</svg>
