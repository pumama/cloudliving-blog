<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Three technique cards -->
  <rect x="50" y="40" width="210" height="230" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <circle cx="155" cy="100" r="35" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="155" y="97" font-family="Arial, sans-serif" font-size="28" fill="#0284C7" text-anchor="middle">1</text>
  <text x="155" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Tone Strike</text>
  <text x="155" y="182" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Finger pad on</text>
  <text x="155" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">tone field</text>
  <text x="155" y="222" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">Bounce off instantly</text>

  <rect x="295" y="40" width="210" height="230" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <circle cx="400" cy="100" r="35" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="400" y="97" font-family="Arial, sans-serif" font-size="28" fill="#0284C7" text-anchor="middle">2</text>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Ding Strike</text>
  <text x="400" y="182" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Thumb on center</text>
  <text x="400" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">dome</text>
  <text x="400" y="222" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">Deep bass note</text>

  <rect x="540" y="40" width="210" height="230" rx="12" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <circle cx="645" cy="100" r="35" fill="#F0F9FF" stroke="#0284C7" stroke-width="1.5"/>
  <text x="645" y="97" font-family="Arial, sans-serif" font-size="28" fill="#0284C7" text-anchor="middle">3</text>
  <text x="645" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">Tak / Slap</text>
  <text x="645" y="182" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Fingertips on</text>
  <text x="645" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">shoulder edge</text>
  <text x="645" y="222" font-family="Arial, sans-serif" font-size="11" fill="#0284C7" text-anchor="middle">Percussive rhythm</text>

  <text x="400" y="305" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Three strikes. That's all you need to start.</text>
</svg>
