<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <rect width="800" height="320" rx="16" fill="#F0F9FF"/>
  <!-- Circular workflow -->
  <circle cx="400" cy="155" r="110" fill="none" stroke="#0284C7" stroke-width="1" stroke-dasharray="6 4" opacity="0.2"/>
  <!-- Steps around circle -->
  <rect x="355" y="30" width="90" height="36" rx="8" fill="#0284C7"/>
  <text x="400" y="53" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">1. Plan</text>

  <rect x="510" y="70" width="100" height="36" rx="8" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <text x="560" y="93" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">2. Scaffold</text>

  <rect x="540" y="150" width="90" height="36" rx="8" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <text x="585" y="173" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">3. Build</text>

  <rect x="480" y="225" width="100" height="36" rx="8" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <text x="530" y="248" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">4. Review</text>

  <rect x="300" y="240" width="100" height="36" rx="8" fill="white" stroke="#0284C7" stroke-width="1.5"/>
  <text x="350" y="263" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0284C7" text-anchor="middle">5. Iterate</text>

  <rect x="190" y="170" width="80" height="36" rx="8" fill="#0284C7"/>
  <text x="230" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">6. Ship</text>

  <!-- Center text -->
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7" text-anchor="middle">The</text>
  <text x="400" y="172" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0284C7" text-anchor="middle">Workflow</text>

  <!-- Bottom -->
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">Plan → Scaffold → Build → Review → Iterate → Ship</text>
</svg>
